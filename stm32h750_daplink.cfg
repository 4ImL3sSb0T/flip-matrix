source [find interface/cmsis-dap.cfg]
transport select swd

set CHIPNAME stm32h750xx
set WORKAREASIZE 0x8000
source [find target/stm32h7x.cfg]

# stm32h7x.cfg resets adapter speed to 1800 kHz internally, so keep the final
# speed setting after sourcing the target script.
adapter speed 1000

# Prefer connecting while NRST is asserted. This helps when user firmware has
# already reconfigured SWD pins or entered a low-power/reset-sensitive state.
# If your DAPLink wiring does not connect NRST, change this line to:
#   reset_config none
reset_config srst_only srst_nogate connect_assert_srst
